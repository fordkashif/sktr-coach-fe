name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      supabase_ready: ${{ steps.readiness.outputs.supabase_ready }}
    steps:
      - name: Evaluate Supabase E2E readiness
        id: readiness
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PW_SUPABASE_CLUB_ADMIN_EMAIL: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_EMAIL }}
          PW_SUPABASE_CLUB_ADMIN_PASSWORD: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_PASSWORD }}
          PW_SUPABASE_COACH_EMAIL: ${{ secrets.PW_SUPABASE_COACH_EMAIL }}
          PW_SUPABASE_COACH_PASSWORD: ${{ secrets.PW_SUPABASE_COACH_PASSWORD }}
          PW_SUPABASE_ATHLETE_EMAIL: ${{ secrets.PW_SUPABASE_ATHLETE_EMAIL }}
          PW_SUPABASE_ATHLETE_PASSWORD: ${{ secrets.PW_SUPABASE_ATHLETE_PASSWORD }}
          PW_SUPABASE_CLUB_ADMIN_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_TENANT_B_EMAIL }}
          PW_SUPABASE_CLUB_ADMIN_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_TENANT_B_PASSWORD }}
          PW_SUPABASE_COACH_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_COACH_TENANT_B_EMAIL }}
          PW_SUPABASE_COACH_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_COACH_TENANT_B_PASSWORD }}
          PW_SUPABASE_ATHLETE_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_ATHLETE_TENANT_B_EMAIL }}
          PW_SUPABASE_ATHLETE_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_ATHLETE_TENANT_B_PASSWORD }}
        run: |
          missing=0
          for key in \
            VITE_SUPABASE_URL \
            VITE_SUPABASE_ANON_KEY \
            PW_SUPABASE_CLUB_ADMIN_EMAIL \
            PW_SUPABASE_CLUB_ADMIN_PASSWORD \
            PW_SUPABASE_COACH_EMAIL \
            PW_SUPABASE_COACH_PASSWORD \
            PW_SUPABASE_ATHLETE_EMAIL \
            PW_SUPABASE_ATHLETE_PASSWORD \
            PW_SUPABASE_CLUB_ADMIN_TENANT_B_EMAIL \
            PW_SUPABASE_CLUB_ADMIN_TENANT_B_PASSWORD \
            PW_SUPABASE_COACH_TENANT_B_EMAIL \
            PW_SUPABASE_COACH_TENANT_B_PASSWORD \
            PW_SUPABASE_ATHLETE_TENANT_B_EMAIL \
            PW_SUPABASE_ATHLETE_TENANT_B_PASSWORD
          do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "supabase_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "supabase_ready=false" >> "$GITHUB_OUTPUT"
          fi

  mock-e2e:
    name: Mock E2E (required)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mock E2E suite
        run: npm run test:e2e

      - name: Upload mock Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  supabase-e2e:
    name: Supabase E2E (optional, secret-gated)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.supabase_ready == 'true'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      PW_SUPABASE_CLUB_ADMIN_EMAIL: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_EMAIL }}
      PW_SUPABASE_CLUB_ADMIN_PASSWORD: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_PASSWORD }}
      PW_SUPABASE_COACH_EMAIL: ${{ secrets.PW_SUPABASE_COACH_EMAIL }}
      PW_SUPABASE_COACH_PASSWORD: ${{ secrets.PW_SUPABASE_COACH_PASSWORD }}
      PW_SUPABASE_ATHLETE_EMAIL: ${{ secrets.PW_SUPABASE_ATHLETE_EMAIL }}
      PW_SUPABASE_ATHLETE_PASSWORD: ${{ secrets.PW_SUPABASE_ATHLETE_PASSWORD }}
      PW_SUPABASE_CLUB_ADMIN_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_TENANT_B_EMAIL }}
      PW_SUPABASE_CLUB_ADMIN_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_CLUB_ADMIN_TENANT_B_PASSWORD }}
      PW_SUPABASE_COACH_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_COACH_TENANT_B_EMAIL }}
      PW_SUPABASE_COACH_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_COACH_TENANT_B_PASSWORD }}
      PW_SUPABASE_ATHLETE_TENANT_B_EMAIL: ${{ secrets.PW_SUPABASE_ATHLETE_TENANT_B_EMAIL }}
      PW_SUPABASE_ATHLETE_TENANT_B_PASSWORD: ${{ secrets.PW_SUPABASE_ATHLETE_TENANT_B_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Supabase auth states
        run: npm run test:e2e:supabase:setup

      - name: Run Supabase E2E suite
        run: npm run test:e2e:supabase

      - name: Upload Supabase Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-supabase
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
